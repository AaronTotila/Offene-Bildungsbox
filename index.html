        /* --- Hauptbereich --- */
        .main-container {
            display: flex;
            flex: 1;
        }

        .sidebar {
            width: 60px;
            border-right: 4px solid black;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-box {
            height: 150px;
            border-bottom: 4px solid black;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            padding: 40px;
            flex: 1;
            align-content: start;
        }

        .grid-item {
            display: block;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s;
        }

        .grid-item:hover {
            transform: scale(1.02);
        }

        /* --- Die exakte Projektbox --- */
        .project-box {
            display: grid;
            /* 40 Teile fürs Bild, 3 Teile für den rechten Rahmen */
            grid-template-columns: 40fr 3fr;
            /* 30 Teile fürs Bild, 3 Teile für den unteren Rahmen */
            grid-template-rows: 30fr 3fr;
            /* Daraus ergibt sich das Gesamtratio: Breite(43) / Höhe(33) */
            aspect-ratio: 43 / 33; 
            border: 4px solid black; 
            background-color: white;
        }

        /* Das Bildfeld (exakt 4:3) */
        .inner-content {
            grid-column: 1 / 2;
            grid-row: 1 / 2;
            background-color: #d9d9d9;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            overflow: hidden;
        }

        .inner-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: top left;
        }

        /* Rechter Rahmen mit 5 Flächen */
        .border-right {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
            border-left: 4px solid black; /* Die vertikale Trennlinie zum Bild */
            display: flex;
            flex-direction: column; /* Stapelt die 5 Boxen übereinander */
        }

        .border-right-box {
            flex: 1; /* Teilt die Höhe exakt durch 5 */
        }

        /* Zeichnet die 4 Trennstriche zwischen den 5 Boxen */
        .border-right-box:not(:last-child) {
            border-bottom: 4px solid black;
        }

        /* Unterer Rahmen mit 5 Flächen */
        .border-bottom {
            grid-column: 1 / 2;
            grid-row: 2 / 3;
            border-top: 4px solid black; /* Die horizontale Trennlinie zum Bild */
            display: flex; /* Legt die 5 Boxen nebeneinander */
        }

        .border-bottom-box {
            flex: 1; /* Teilt die Breite exakt durch 5 */
        }

        /* Zeichnet die 4 Trennstriche zwischen den 5 Boxen */
        .border-bottom-box:not(:last-child) {
            border-right: 4px solid black;
        }

        /* Die quadratische Ecke unten rechts */
        .border-corner {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
            background-color: white;
            border-left: 4px solid black;
            border-top: 4px solid black;
        }

    </style>
