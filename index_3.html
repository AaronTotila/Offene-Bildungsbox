<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offene Bildungsbox</title>
    <style>
        /* Grundlegendes Styling und Schriftart */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; /* Passt zum verspielten Look */
        }

        body {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Menüleiste (Top Nav) --- */
        .top-nav {
            display: flex;
            flex-wrap: wrap; /* Macht die Leiste "knickbar" bei kleineren Bildschirmen */
            border-bottom: 5px solid black;
            background-color: white;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-empty {
            width: 5vw;
            border-right: 4px solid black;
            flex-shrink: 0;
        }

        .nav-link {
            flex: 1;
            text-align: center;
            padding: 15px 20px;
            text-decoration: none;
            color: black;
            font-weight: bold;
            font-size: 1.2rem;
            border-right: 4px solid black;
            transition: background-color 0.3s, color 0.3s;
            min-width: 120px; /* Verhindert, dass die Buttons zu klein werden */
        }

        .nav-link:last-child {
            border-right: none;
        }

        /* Hover-Effekt für die Menüleiste */
        .nav-link:hover {
            background-color: #ffd700; /* Gelbe Hover-Farbe - kannst du anpassen */
            color: #000;
        }

        /* --- Hauptbereich (Sidebar + Grid) --- */
        .main-container {
            display: flex;
            flex: 1;
        }

        /* --- Linke Sidebar (Leere Boxen) --- */
        .sidebar {
            width: 5vw;
            border-right: 4px solid black;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-box {
            height: 20%;
            border-bottom: 4px solid black;
        }

        /* --- Content Raster (Arcade Automaten) --- */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            padding: 40px;
            flex: 1;
            align-content: start;
        }

        /* Klickbare Kacheln */
        .grid-item {
            display: block;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s;
        }

        .grid-item:hover {
            transform: scale(1.02); /* Leichter Zoom-Effekt beim Hovern */
        }

        /* Das graue Feld mit den "Lineal"-Rändern unten und rechts */
        .arcade-box {
            background-color: #d9d9d9;
            aspect-ratio: 4 / 3;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 5px solid black;
            border-right: 5px solid black;
        }

        /* Dekorative "Striche" (Lineal-Optik) an der Box */
        .arcade-box::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 20px;
            background-image: repeating-linear-gradient(to right, transparent, transparent 20%, black 20%, black 22%);
        }

        .arcade-box::before {
            content: '';
            position: absolute;
            top: 0;
            right: -2px;
            height: 100%;
            width: 20px;
            background-image: repeating-linear-gradient(to bottom, transparent, transparent 20%, black 20%, black 22%);
        }

        /* Das eigentliche Bild des Automaten */
        .arcade-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

    </style>
</head>
